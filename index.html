<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BinaryTrade - High/Low Trading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #e0e4f0;
            font-family: 'Inter', system-ui, sans-serif;
            overflow-x: hidden;
        }
        .app { max-width: 500px; margin: 0 auto; padding: 16px; min-height: 100vh; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: linear-gradient(135deg, #0f1629, #0a0e1a);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid #1f2a44;
        }
        .logo h2 { font-size: 20px; background: linear-gradient(135deg, #f0b90b, #f0b90b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-box { text-align: right; }
        .balance-label { font-size: 10px; color: #8a92b0; }
        .balance-value { font-size: 22px; font-weight: bold; color: #f0b90b; }
        
        /* Chart */
        .chart-container {
            background: #0f1629;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #1f2a44;
        }
        canvas {
            width: 100%;
            height: 250px;
            background: #0d1224;
            border-radius: 12px;
        }
        
        /* Market Info */
        .market-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #0f1629;
            border-radius: 16px;
            margin-bottom: 16px;
            border: 1px solid #1f2a44;
        }
        .current-price {
            font-size: 24px;
            font-weight: bold;
            font-family: monospace;
        }
        .current-price.up { color: #00c853; }
        .current-price.down { color: #ff3b30; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .status-open { background: #00c85320; color: #00c853; border: 1px solid #00c85340; }
        .status-closed { background: #ff3b3020; color: #ff3b30; border: 1px solid #ff3b3040; }
        
        /* Timer */
        .timer-card {
            background: linear-gradient(135deg, #1a1f33, #0f1629);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
            border: 1px solid #f0b90b;
        }
        .timer-value {
            font-size: 48px;
            font-weight: bold;
            font-family: monospace;
            color: #f0b90b;
        }
        .trade-status {
            font-size: 12px;
            color: #8a92b0;
            margin-top: 8px;
        }
        
        /* Trading Buttons */
        .trade-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .btn-high, .btn-low {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-high:active, .btn-low:active { transform: scale(0.97); }
        .btn-high {
            background: linear-gradient(135deg, #00c853, #009624);
            color: white;
        }
        .btn-low {
            background: linear-gradient(135deg, #ff3b30, #cc2f25);
            color: white;
        }
        .btn-disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Bet Input */
        .bet-control {
            background: #0f1629;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #1f2a44;
        }
        .bet-amount {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
        }
        .bet-amount input {
            flex: 1;
            padding: 12px;
            background: #1a1f33;
            border: 1px solid #2a3555;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        .quick-bets {
            display: flex;
            gap: 8px;
        }
        .quick-bet {
            flex: 1;
            padding: 8px;
            background: #1a1f33;
            border: 1px solid #2a3555;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
        }
        .quick-bet:active { background: #2a3555; }
        
        /* History */
        .history-card {
            background: #0f1629;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1f2a44;
        }
        .history-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #f0b90b;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #1f2a44;
        }
        .history-result-win { color: #00c853; }
        .history-result-loss { color: #ff3b30; }
        
        /* Auth Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.hidden { display: none; }
        .modal-box {
            background: #0f1629;
            padding: 28px;
            border-radius: 24px;
            width: 90%;
            max-width: 360px;
            border: 1px solid #f0b90b;
        }
        .modal-box h3 { margin-bottom: 20px; text-align: center; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1a1f33;
            border: 1px solid #2a3555;
            border-radius: 10px;
            color: white;
        }
        .modal-box button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: linear-gradient(135deg, #f0b90b, #d49a08);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #1a1f33;
            border: none;
            border-radius: 10px;
            color: #8a92b0;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #f0b90b;
            color: #0a0e1a;
        }
        .error-msg {
            color: #ff3b30;
            font-size: 11px;
            margin-top: 8px;
            text-align: center;
        }
        .profit-badge {
            font-size: 11px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div id="authModal" class="modal">
        <div class="modal-box">
            <h3>🔐 BINARY TRADE</h3>
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>
            <div id="loginForm">
                <input type="text" id="loginUser" placeholder="Username">
                <input type="password" id="loginPass" placeholder="Password">
                <button onclick="doLogin()">Login</button>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="signupForm" style="display: none;">
                <input type="text" id="signupUser" placeholder="Username">
                <input type="password" id="signupPass" placeholder="Password">
                <button onclick="doSignup()">Create Account</button>
                <div id="signupError" class="error-msg"></div>
            </div>
        </div>
    </div>

    <div id="mainApp" class="app" style="display: none;">
        <div class="header">
            <div class="logo"><h2>📊 BINARY TRADE</h2></div>
            <div class="balance-box">
                <div class="balance-label">BALANCE</div>
                <div class="balance-value" id="balance">0.00</div>
                <div class="profit-badge" id="profitBadge"></div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart" width="800" height="250"></canvas>
        </div>

        <div class="market-info">
            <div>
                <div style="font-size: 10px; color: #8a92b0;">Current Price</div>
                <div class="current-price" id="currentPrice">0.00</div>
            </div>
            <div>
                <div style="font-size: 10px; color: #8a92b0;">24h Change</div>
                <div id="priceChange">0.00%</div>
            </div>
            <div>
                <div id="marketStatus" class="status-badge status-closed">CLOSED</div>
            </div>
        </div>

        <div class="timer-card">
            <div class="timer-value" id="timer">--</div>
            <div class="trade-status" id="tradeStatus">🔒 Market is closed</div>
        </div>

        <div class="bet-control">
            <div class="bet-amount">
                <input type="number" id="betAmount" value="10" min="1" step="5">
            </div>
            <div class="quick-bets">
                <div class="quick-bet" onclick="setBetAmount(10)">10</div>
                <div class="quick-bet" onclick="setBetAmount(25)">25</div>
                <div class="quick-bet" onclick="setBetAmount(50)">50</div>
                <div class="quick-bet" onclick="setBetAmount(100)">100</div>
                <div class="quick-bet" onclick="setBetAmount(500)">500</div>
            </div>
        </div>

        <div class="trade-buttons">
            <button class="btn-high" id="highBtn" onclick="placeTrade('high')">📈 HIGH</button>
            <button class="btn-low" id="lowBtn" onclick="placeTrade('low')">📉 LOW</button>
        </div>

        <div class="history-card">
            <div class="history-title">📜 Trade History</div>
            <div id="historyList">
                <div style="text-align: center; color: #8a92b0; padding: 20px;">No trades yet</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCJPWBRExcq3rjltVaRvc9-HwAn9iRlyRU",
            authDomain: "aviator-bappy.firebaseapp.com",
            databaseURL: "https://aviator-bappy-default-rtdb.firebaseio.com",
            projectId: "aviator-bappy",
            storageBucket: "aviator-bappy.firebasestorage.app",
            messagingSenderId: "380289888792",
            appId: "1:380289888792:web:afda6c3a33383d641f496d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;
        let currentPrice = 100;
        let marketOpen = false;
        let chartData = [];
        let chartCanvas, chartCtx;
        let tradeActive = false;
        let tradeDirection = null;
        let tradeEndPrice = null;
        let timerInterval = null;
        let tradeTimeLeft = 0;
        let tradeAmount = 0;
        
        let users = JSON.parse(localStorage.getItem('binary_users') || '{}');

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const btns = document.querySelectorAll('.tab-btn');
            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
            }
        }

        function doLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!users[user] || users[user].password !== pass) {
                document.getElementById('loginError').textContent = 'Invalid username or password';
                return;
            }
            currentUser = user;
            localStorage.setItem('binary_current_user', user);
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'block';
            loadUserData();
            initChart();
            startMarketListener();
        }

        function doSignup() {
            const user = document.getElementById('signupUser').value.trim();
            const pass = document.getElementById('signupPass').value;
            if (!user || !pass) {
                document.getElementById('signupError').textContent = 'Fill all fields';
                return;
            }
            if (users[user]) {
                document.getElementById('signupError').textContent = 'Username exists';
                return;
            }
            users[user] = {
                password: pass,
                balance: 1000,
                history: []
            };
            localStorage.setItem('binary_users', JSON.stringify(users));
            currentUser = user;
            localStorage.setItem('binary_current_user', user);
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('mainApp').style.display = 'block';
            loadUserData();
            initChart();
            startMarketListener();
        }

        function loadUserData() {
            if (!users[currentUser]) return;
            document.getElementById('balance').textContent = users[currentUser].balance.toFixed(2);
            renderHistory();
            updateProfitBadge();
        }

        function saveUserData() {
            localStorage.setItem('binary_users', JSON.stringify(users));
            document.getElementById('balance').textContent = users[currentUser].balance.toFixed(2);
            updateProfitBadge();
        }

        function updateProfitBadge() {
            const totalTrades = users[currentUser]?.history?.length || 0;
            const wins = users[currentUser]?.history?.filter(h => h.result === 'win').length || 0;
            const winRate = totalTrades > 0 ? (wins / totalTrades * 100).toFixed(1) : 0;
            document.getElementById('profitBadge').innerHTML = `🏆 Win Rate: ${winRate}%`;
        }

        function startMarketListener() {
            const marketRef = db.ref('binary/market');
            marketRef.on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    currentPrice = data.price || 100;
                    marketOpen = data.isOpen || false;
                    updateMarketUI(data);
                    addChartPoint(currentPrice);
                    if (tradeActive) {
                        checkTradeResult();
                    }
                }
            });
        }

        function updateMarketUI(data) {
            const priceEl = document.getElementById('currentPrice');
            const changeEl = document.getElementById('priceChange');
            const statusEl = document.getElementById('marketStatus');
            
            priceEl.textContent = data.price.toFixed(2);
            priceEl.className = `current-price ${data.change >= 0 ? 'up' : 'down'}`;
            changeEl.textContent = `${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%`;
            
            if (data.isOpen) {
                statusEl.textContent = 'OPEN';
                statusEl.className = 'status-badge status-open';
                if (!tradeActive) {
                    document.getElementById('highBtn').classList.remove('btn-disabled');
                    document.getElementById('lowBtn').classList.remove('btn-disabled');
                }
            } else {
                statusEl.textContent = 'CLOSED';
                statusEl.className = 'status-badge status-closed';
                document.getElementById('highBtn').classList.add('btn-disabled');
                document.getElementById('lowBtn').classList.add('btn-disabled');
            }
        }

        // Chart
        function initChart() {
            chartCanvas = document.getElementById('priceChart');
            chartCtx = chartCanvas.getContext('2d');
            chartCanvas.width = chartCanvas.clientWidth;
            chartCanvas.height = chartCanvas.clientHeight;
            
            for (let i = 0; i < 100; i++) {
                chartData.push(100);
            }
            drawChart();
        }

        function addChartPoint(price) {
            chartData.push(price);
            if (chartData.length > 100) chartData.shift();
            drawChart();
        }

        function drawChart() {
            if (!chartCanvas || !chartCtx) return;
            const width = chartCanvas.clientWidth;
            const height = chartCanvas.clientHeight;
            chartCanvas.width = width;
            chartCanvas.height = height;
            
            if (chartData.length < 2) return;
            
            const min = Math.min(...chartData);
            const max = Math.max(...chartData);
            const range = max - min || 1;
            
            chartCtx.clearRect(0, 0, width, height);
            
            // Grid
            chartCtx.strokeStyle = '#1f2a44';
            chartCtx.lineWidth = 0.5;
            for (let i = 0; i <= 4; i++) {
                const y = height - (i * height / 4);
                chartCtx.beginPath();
                chartCtx.moveTo(0, y);
                chartCtx.lineTo(width, y);
                chartCtx.stroke();
            }
            
            // Line
            chartCtx.beginPath();
            chartCtx.strokeStyle = '#f0b90b';
            chartCtx.lineWidth = 2;
            
            const step = width / (chartData.length - 1);
            for (let i = 0; i < chartData.length; i++) {
                const x = i * step;
                const y = height - ((chartData[i] - min) / range) * (height - 40) - 20;
                if (i === 0) chartCtx.moveTo(x, y);
                else chartCtx.lineTo(x, y);
            }
            chartCtx.stroke();
            
            // Fill
            chartCtx.lineTo(width, height);
            chartCtx.lineTo(0, height);
            chartCtx.fillStyle = '#f0b90b10';
            chartCtx.fill();
        }

        function setBetAmount(amt) {
            document.getElementById('betAmount').value = amt;
        }

        function placeTrade(direction) {
            if (!marketOpen) {
                alert('Market is closed!');
                return;
            }
            if (tradeActive) {
                alert('Wait for current trade to finish!');
                return;
            }
            
            const amount = parseFloat(document.getElementById('betAmount').value);
            if (amount <= 0 || isNaN(amount)) {
                alert('Enter valid amount');
                return;
            }
            if (amount > users[currentUser].balance) {
                alert('Insufficient balance!');
                return;
            }
            
            // Get trade duration from admin settings (default 30 sec)
            db.ref('binary/settings').get().then((snap) => {
                const settings = snap.val() || { tradeDuration: 30 };
                const duration = settings.tradeDuration || 30;
                
                tradeActive = true;
                tradeDirection = direction;
                tradeAmount = amount;
                tradeTimeLeft = duration;
                tradeEndPrice = null;
                
                users[currentUser].balance -= amount;
                saveUserData();
                
                updateTimerDisplay();
                document.getElementById('tradeStatus').innerHTML = `📊 ${direction.toUpperCase()} Trade • ${amount} USDT at risk`;
                document.getElementById('highBtn').classList.add('btn-disabled');
                document.getElementById('lowBtn').classList.add('btn-disabled');
                
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    tradeTimeLeft--;
                    updateTimerDisplay();
                    
                    if (tradeTimeLeft <= 0) {
                        clearInterval(timerInterval);
                        finalizeTrade();
                    }
                }, 1000);
            });
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(tradeTimeLeft / 60);
            const seconds = tradeTimeLeft % 60;
            document.getElementById('timer').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function checkTradeResult() {
            if (!tradeActive || tradeEndPrice) return;
            tradeEndPrice = currentPrice;
        }

        function finalizeTrade() {
            if (!tradeActive) return;
            
            const entryPrice = chartData[chartData.length - 2] || currentPrice;
            const exitPrice = currentPrice;
            let won = false;
            
            if (tradeDirection === 'high') {
                won = exitPrice > entryPrice;
            } else {
                won = exitPrice < entryPrice;
            }
            
            let winAmount = 0;
            let result = 'loss';
            
            if (won) {
                winAmount = tradeAmount * 1.85; // 85% payout
                users[currentUser].balance += winAmount;
                result = 'win';
            }
            
            saveUserData();
            
            // Add to history
            users[currentUser].history.unshift({
                date: new Date().toLocaleTimeString(),
                direction: tradeDirection,
                amount: tradeAmount,
                result: result,
                payout: winAmount,
                entryPrice: entryPrice.toFixed(2),
                exitPrice: exitPrice.toFixed(2)
            });
            if (users[currentUser].history.length > 20) users[currentUser].history.pop();
            saveUserData();
            renderHistory();
            
            // Show result
            if (won) {
                document.getElementById('tradeStatus').innerHTML = `🎉 WIN! +${winAmount.toFixed(2)} USDT`;
                document.getElementById('timer').style.color = '#00c853';
                setTimeout(() => {
                    document.getElementById('timer').style.color = '#f0b90b';
                }, 2000);
            } else {
                document.getElementById('tradeStatus').innerHTML = `💀 LOSS! -${tradeAmount.toFixed(2)} USDT`;
                document.getElementById('timer').style.color = '#ff3b30';
                setTimeout(() => {
                    document.getElementById('timer').style.color = '#f0b90b';
                }, 2000);
            }
            
            // Reset trade
            tradeActive = false;
            tradeEndPrice = null;
            
            if (marketOpen) {
                document.getElementById('highBtn').classList.remove('btn-disabled');
                document.getElementById('lowBtn').classList.remove('btn-disabled');
            }
            
            updateProfitBadge();
            
            setTimeout(() => {
                if (!tradeActive) {
                    document.getElementById('tradeStatus').innerHTML = marketOpen ? '💰 Place your trade' : '🔒 Market is closed';
                }
            }, 3000);
        }

        function renderHistory() {
            const history = users[currentUser]?.history || [];
            const container = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #8a92b0; padding: 20px;">No trades yet</div>';
                return;
            }
            
            container.innerHTML = history.map(h => `
                <div class="history-item">
                    <div>
                        <div style="font-weight: bold;">${h.direction === 'high' ? '📈 HIGH' : '📉 LOW'}</div>
                        <div style="font-size: 10px; color: #8a92b0;">${h.date}</div>
                    </div>
                    <div>
                        <div>${h.amount} USDT</div>
                        <div class="${h.result === 'win' ? 'history-result-win' : 'history-result-loss'}">
                            ${h.result === 'win' ? `+${h.payout.toFixed(2)}` : `-${h.amount.toFixed(2)}`}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.addEventListener('resize', () => drawChart());
        setInterval(() => {
            if (chartCanvas) drawChart();
        }, 100);
    </script>
</body>
</html>
